"on":
  push:
    branches:
      - main
    paths:
      - '*-morning-note.md'
name: Email Morning Note
jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send email
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          FILE=$(ls *-morning-note.md 2>/dev/null | sort | tail -1)
          if [ -z "$FILE" ]; then
            echo "No morning note file found, skipping"
            exit 0
          fi
          DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          echo "Sending: $FILE ($DATE)"
          python3 - << PYEOF
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          file = os.popen('ls *-morning-note.md | sort | tail -1').read().strip()
          date = os.popen(f'echo "{file}" | grep -oE "[0-9]{{4}}-[0-9]{{2}}-[0-9]{{2}}"').read().strip()
          password = os.environ['GMAIL_PASSWORD']
          with open(file) as f:
              body = f.read()
          msg = MIMEMultipart()
          msg['Subject'] = f'Morning Note - {date}'
          msg['From'] = 'johnjohnjohn1019@gmail.com'
          msg['To'] = 'johnjohnjohn1019@gmail.com'
          msg.attach(MIMEText(body, 'plain'))
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login('johnjohnjohn1019@gmail.com', password)
              s.send_message(msg)
          print('Email sent!')
          PYEOF
